workflows:
  android-workflow:
    name: Android Build

    environment:
      java: 21

    scripts:
      - name: Clean
        script: ./gradlew clean

      - name: Build APK
        script: |
          ./gradlew assembleRelease \
          --no-daemon \
          --stacktrace

    artifacts:
      - "**/*.apk"

    max_build_duration: 120
